<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadCity Management Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Outfit', sans-serif;
    }

    .dot-loader {
      width: 40px;
      height: 40px;
      border: 4px solid #EFF6FF;
      border-top: 4px solid #2563EB;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-weight: 800;
      color: #1E3A8A;
      letter-spacing: 1px;
      font-size: 0.75rem;
    }
  </style>
</head>

<body>
  <div id="preloader">
    <div class="dot-loader"></div>
    <div class="loading-text">SECURING ACCESS...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="src/main.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      const preloader = document.getElementById('preloader');
      if (preloader) {
        setTimeout(() => {
          preloader.style.opacity = '0';
          setTimeout(() => preloader.remove(), 500);
        }, 500);
      }
    });
  </script>
</body>

</html>
