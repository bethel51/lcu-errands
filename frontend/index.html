<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e4db7" />
    <title>LeadCity Errands | Campus Task Platform</title>
    
    <meta name="description" content="The premier errand and task platform for LeadCity University students. Post errands or earn by helping others." />
    
    <!-- Speed: Preconnect to font domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Speed: Load fonts via link instead of CSS @import to avoid render-blocking chains -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Performance: Preload critical assets -->
    <link rel="preload" href="logo.png" as="image" />

    <style>
      #app-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #FFFFFF;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .loader-bar {
        width: 140px;
        height: 4px;
        background: #EFF6FF;
        border-radius: 10px;
        position: relative;
        overflow: hidden;
        margin-top: 20px;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        width: 40%;
        height: 100%;
        background: #2563EB;
        border-radius: 10px;
        animation: loading-slide 1s ease-in-out infinite;
      }
      @keyframes loading-slide {
        0% { left: -40%; }
        100% { left: 100%; }
      }
      .logo-loading {
        width: 60px;
        height: 60px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="app-preloader">
      <img src="logo.png" alt="LCU" class="logo-loading" />
      <div class="loader-bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('app-preloader');
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.5s ease';
            setTimeout(() => loader.remove(), 500);
          }, 800);
        }
      });
    </script>
  </body>
</html>
