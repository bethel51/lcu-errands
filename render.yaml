services:
  # 1. Main Platform Backend (Serves Main Frontend)
  - type: web
    name: leadcity-backend
    env: node
    plan: free
    region: frankfurt
    rootDir: .
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromConfig: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://leadcityerrands-wt32.onrender.com

      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        value: "true"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  # 2. Administrative Backend
  - type: web
    name: leadcity-admin-service
    env: node
    plan: free
    region: frankfurt
    rootDir: admin-service
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromConfig: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_FRONTEND_URL
        value: https://leadcity-admin-portal.onrender.com
      - key: FRONTEND_URL
        value: https://leadcityerrands-wt32.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  # 3. Admin Portal (Static Frontend)
  - type: static
    name: leadcity-admin-portal
    rootDir: admin-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_ADMIN_API_URL
        value: https://leadcity-admin-service.onrender.com
      - key: VITE_API_URL
        value: https://leadcityerrands-prod.onrender.com
      - key: VITE_CRON_SECRET
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # 4. Main Platform Frontend (Static Site)
  - type: static
    name: leadcity-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build

    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://leadcityerrands-prod.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

