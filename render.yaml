services:
  # 1. Main Platform Backend (Serves Main Frontend)
  - type: web
    name: leadcity-backend
    env: node
    plan: free
    rootDir: .
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromConfig: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://leadcity-backend.onrender.com # Change this if using custom domain
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true

  # 2. Administrative Backend
  - type: web
    name: leadcity-admin-service
    env: node
    plan: free
    rootDir: admin-service
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        fromConfig: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_FRONTEND_URL
        value: https://leadcity-admin-portal.onrender.com
      - key: FRONTEND_URL
        value: https://leadcity-backend.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # 3. Admin Portal (Static Frontend)
  - type: static
    name: leadcity-admin-portal
    rootDir: admin-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
